version: 1
project_name: code-brain
worker:
  idle_ttl_seconds: 1800
hot_path:
  target_ms: 200
features:
  embeddings: false
  remote_llm: false
  external_notifications: false
  remote_memory: false
remote_memory:
  provider: cloudflare
  inject_on_session_start: false
  default_scope: project
  cache_path: .ai/cache/remote-memory/summary.json
memory_sync:
  enabled: false
cache:
  sqlite_path: .ai/cache/code.sqlite
search:
  retriever: bm25
manifest:
  path: .ai/generated/manifest.json
