version: 1
project_name: code-brain
worker:
  idle_ttl_seconds: 1800
hot_path:
  target_ms: 200
features:
  embeddings: false
  remote_llm: false
  external_notifications: false
  remote_memory: false
remote_memory:
  provider: cloudflare
  inject_on_session_start: false
  default_scope: project
  cache_path: .ai/cache/remote-memory/summary.json
memory_sync:
  enabled: false
cache:
  sqlite_path: .ai/cache/code.sqlite
search:
  retriever: bm25
manifest:
  path: .ai/generated/manifest.json
autoresearch:
  schema_version: 1
  enable_web_ingest: false
  search:
    corpus_threshold_tokens: 50000   # Stage 1 dense activates only above this (PRD 4.6)
  # trust_hosts (optional): server-side domain to tier allowlist; callers cannot self-declare.
  # Add entries under trust_hosts, e.g.  arxiv.org: primary  (single-label keys are rejected).
