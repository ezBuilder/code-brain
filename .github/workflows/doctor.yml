name: doctor

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: doctor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: make quick
      - run: make smoke
      - run: make docs-check
      - run: make package
      - run: make verify-artifacts
      - run: make install-check
      - run: make tamper-check
      - run: make report
      - run: make release-gate
