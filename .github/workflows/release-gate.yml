name: release-gate

on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    name: release-gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      CI: "true"
      AI_CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Release gate
        run: ./scripts/release-gate.sh

      - name: CI write rejection probe
        run: |
          set +e
          uv run --project .ai/runtime ai render --json >ci-write-probe.json
          rc="$?"
          set -e
          if [[ "$rc" -eq 16 ]]; then
            exit 0
          fi
          cat ci-write-probe.json
          exit 1

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: code-brain-release-artifacts-${{ matrix.os }}
          path: |
            dist/code-brain-*.tar.gz
            dist/code-brain-*.tar.gz.sha256
            dist/code-brain-*.manifest.json
            dist/code-brain-*.sbom.json
            dist/code-brain-*.provenance.json
            dist/code-brain-*.release-notes.md
            dist/dep-advisory.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload release gate summary
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-summary-${{ matrix.os }}
          path: dist/release-gate.summary.json
          if-no-files-found: error
          retention-days: 14

  summary-observe:
    name: summary-observe
    needs: release-gate
    runs-on: ubuntu-latest
    env:
      CI: "true"
      AI_CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download release gate summaries
        uses: actions/download-artifact@v8
        with:
          pattern: release-gate-summary-*
          path: .ci-summaries

      - name: Compare canonical summary parity
        run: |
          python scripts/summary-parity.py \
            .ci-summaries/release-gate-summary-ubuntu-latest/release-gate.summary.json \
            .ci-summaries/release-gate-summary-macos-latest/release-gate.summary.json \
            --json
