name: windows-runtime

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: windows-runtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Sync runtime deps
        shell: pwsh
        run: |
          uv sync --project .ai/runtime --all-extras --dev
      - name: Pytest (Windows portability tests)
        shell: pwsh
        run: |
          Remove-Item Env:CI -ErrorAction SilentlyContinue
          Remove-Item Env:GITHUB_ACTIONS -ErrorAction SilentlyContinue
          Remove-Item Env:GITLAB_CI -ErrorAction SilentlyContinue
          Remove-Item Env:AI_CI -ErrorAction SilentlyContinue
          uv run --project .ai/runtime python -m pytest `
            .ai/runtime/tests/test_cli.py `
            .ai/runtime/tests/test_mcp_config_and_antigravity.py `
            .ai/runtime/tests/test_recommend.py `
            -k "preflight or mcp_methods_registered or secret_scan_uses_git_baseline_not_local_noise or os_aware or powershell or ps1 or windows" `
            --tb=short -q
