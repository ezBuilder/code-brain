name = "code-brain-remote-memory"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Required secrets:
#   wrangler secret put AUTH_TOKEN
# Optional:
#   wrangler secret put ALLOWED_ORIGINS

[[d1_databases]]
binding = "DB"
database_name = "code-brain-remote-memory"
database_id = "7aebd751-4aef-4336-9cd3-88803d8b6347"

[[vectorize]]
binding = "VECTORIZE"
index_name = "code-brain-remote-memory-vectors"

[ai]
binding = "AI"
